<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card - Redes Sociais</title>

  <!-- Google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">

  <!-- Chamada para a folha de estilos -->
  <link rel="stylesheet" href="./css/styles.css">


</head>

<body>
  <div class="container">

    <!-- Inserindo Imagem  -->
    <img src="./images/photo.png" alt="Foto da Valeria Muniz" />

    <!-- Título Principal -->
    <h1>Valéria Muniz</h1>

    <!-- Título Secundário -->
    <h2>São Paulo, Brasil</h2>

    <!-- parágrafo -->
    <p>Front-End Senior and avid reader</p>

    <!-- lista de redes sociais -->
    <ul class="social">
      <li><a href="http://github.com" target="_blank">GitHub</a></li>
      <li><a href="http://dribbble.com" target="_blank">Dribbble</a></li>
      <li><a href="http://linkedin.com" target="_blank">Linkedin</a></li>
      <li><a href="http://instagram.com" target="_blank">Instagram</a></li>
      <li><a href="http://x.com" target="_blank">X</a></li>
    </ul>
  </div>

</body>

</html>
